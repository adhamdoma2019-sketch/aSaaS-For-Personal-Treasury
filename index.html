/* Thousand-separator helpers for live-typed amount fields */
function formatAmountText(raw) {
  if (raw === "" || raw === null || raw === undefined) return "";
  let clean = String(raw).replace(/[^\d.]/g, "");
  const firstDot = clean.indexOf(".");
  if (firstDot !== -1) clean = clean.slice(0, firstDot + 1) + clean.slice(firstDot + 1).replace(/\./g, "");
  const [intRaw, decRaw] = clean.split(".");
  let intPart = (intRaw || "").replace(/^0+(?=\d)/, "");
  const withCommas = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return decRaw !== undefined ? `${withCommas}.${decRaw.slice(0, 2)}` : withCommas;
}
function parseAmountText(formatted) {
  if (!formatted) return "";
  const n = parseFloat(String(formatted).replace(/,/g, ""));
  return Number.isFinite(n) ? n : "";
}

/* ============================================================
   LEDGER COMPUTATION
   ============================================================ */
function computeLedger(transactions) {
  const accountBal = {};
  const cpBal = {};
  let loss = 0;
  const live = transactions.filter(t => !t.deleted);
  const sorted = [...live].sort((a, b) => a.txDate < b.txDate ? -1 : a.txDate > b.txDate ? 1 : 0);
  for (const t of sorted) {
    const amt = Number(t.amount) || 0;
    const fee = Number(t.feeAmount) || 0;
    accountBal[t.accountId] = accountBal[t.accountId] || 0;
    accountBal[t.toAccountId] = accountBal[t.toAccountId] || 0;
    cpBal[t.counterpartyId] = cpBal[t.counterpartyId] || 0;
    cpBal[t.toCounterpartyId] = cpBal[t.toCounterpartyId] || 0;
    if (t.feeBearerCounterpartyId) cpBal[t.feeBearerCounterpartyId] = cpBal[t.feeBearerCounterpartyId] || 0;
    switch (t.type) {
      case "IN":
        accountBal[t.accountId] += amt;
        cpBal[t.counterpartyId] += amt;
        break;
      case "OUT":
        accountBal[t.accountId] -= amt + fee;
        cpBal[t.counterpartyId] -= amt;
        if (fee > 0) {
          if (t.feeBearerType === "self") cpBal[t.counterpartyId] -= fee;else if (t.feeBearerType === "other") cpBal[t.feeBearerCounterpartyId] -= fee;else loss += fee; // unassigned
        }
        break;
      case "TRANSFER":
        accountBal[t.accountId] -= amt + fee;
        accountBal[t.toAccountId] += amt;
        if (fee > 0) loss += fee; // internal transfer fees always start unassigned
        break;
      case "P2P":
        {
          cpBal[t.counterpartyId] -= amt;
          let received = amt;
          if (fee > 0) {
            if (t.feeBearerType === "self") cpBal[t.counterpartyId] -= fee;else if (t.feeBearerType === "receiver") received -= fee;
            loss += fee; // always lands in the fee pool for P2P (no account leg)
          }
          cpBal[t.toCounterpartyId] += received;
          break;
        }
      case "LOSS_ALLOC":
        cpBal[t.counterpartyId] -= amt;
        loss -= amt;
        break;
      default:
        break;
    }
  }
  return {
    accountBal,
    cpBal,
    loss
  };
}
